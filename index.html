<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basil Seal Studio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    header {
      background: #111;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.5rem;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #f6a017;
      padding: 10px;
    }

    nav a {
      color: #e52627;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* SLIDESHOW */
   .slideshow {
  overflow: hidden;
  background: #f6a017;
  padding: 20px 0;
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  cursor: grab;
}

    .slide-track {
  display: flex;
  gap: 20px;
}

    .slide-track img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      margin: 0 10px;
      border-radius: 0;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .grid img {
      width: 100%;
      border-radius: 10px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #f6a017;
      color: #e52627;
    }
  </style>
</head>
<script>
const images = [
  "DUNGEON MONSTERS_01.png",
  "DUNGEON MONSTERS_02.png",
  "DUNGEON MONSTERS_03.png",
  "DUNGEON MONSTERS_04.png",
  "DUNGEON MONSTERS_05-01.png",
  "DUNGEON MONSTERS_06.png",
  "DUNGEON MONSTERS_07.png",
  "MYTHO'S-01.png",
  "MYTHO'S-02.png",
  "MYTHO'S-03.png",
  "MYTHO'S-04.png",
  "MYTHO'S-05.png",
  "MYTHO'S-06.png",
  "MYTHO'S-07.png",
  "MYTHO'S-08.png"
];

const track = document.getElementById("slideTrack");
const slider = document.getElementById("slider");

// shuffle immagini
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

// crea slider random
function createSlides() {
  console.log(track);
  console.log(slider);
  track.innerHTML = "";
  const shuffled = shuffle([...images]);

  shuffled.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    track.appendChild(img);
  });
}

createSlides();

// DRAG SCROLL
let isDown = false;
let startX;
let scrollLeft;

slider.addEventListener("mousedown", (e) => {
  isDown = true;
  slider.style.cursor = "grabbing";
  startX = e.pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener("mouseleave", () => {
  isDown = false;
  slider.style.cursor = "grab";
});

slider.addEventListener("mouseup", () => {
  isDown = false;
  slider.style.cursor = "grab";

  // reshuffle quando rilasci
  createSlides();
});

slider.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - slider.offsetLeft;
  const walk = (x - startX) * 1.5;
  slider.scrollLeft = scrollLeft - walk;
});

// SUPPORTO TOUCH (mobile)
slider.addEventListener("touchstart", (e) => {
  startX = e.touches[0].pageX;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener("touchmove", (e) => {
  const x = e.touches[0].pageX;
  const walk = (x - startX) * 1.5;
  slider.scrollLeft = scrollLeft - walk;
});

slider.addEventListener("touchend", () => {
  createSlides();
});
</script>
<body>

<header style="background: #e52627; padding: 15px; text-align: center;">
  <img src="LOGO STUDIO.png" alt="Basil Seal Studio Logo" style="height: 70px;">
</header>

</div>

<section id="sets">

<!-- COLLECTOR PAGE

<!-- CONTACT -->

  <h2>Contatti</h2>

  <p>Email: basilsealstudio@email.com</p>

  <p>
    Instagram:
    <a href="https://www.instagram.com/basil_of_the_nimh/" target="_blank" style="color: #f6a017; text-decoration: none;">
      @basil_of_the_nimh
    </a>
  </p>

  <p>
    Twitter:
    <a href="https://x.com/basilsealstudio" target="_blank" style="color: #f6a017; text-decoration: none;">
      @basilsealstudio
    </a>
  </p>
</section>

<footer>
  © 2026 Basil Seal Studio
</footer>

</body>
</html>
