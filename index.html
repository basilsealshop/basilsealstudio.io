<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basil Seal Studio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    header {
      background: #111;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.5rem;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #f6a017;
      padding: 10px;
    }

    nav a {
      color: #e52627;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* SLIDESHOW */
.slideshow {
  position: relative;
  overflow-x: auto; /* 👈 scroll qui */
  overflow-y: hidden;
  background: #f6a017;
  padding: 30px 0;
  width: 100vw;
  margin-left: calc(-50vw + 50%);
}
.slideshow::-webkit-scrollbar {
  display: none;
}

/* IMPORTANTISSIMO */
.slide-track {
  display: flex;
  gap: 20px;
  align-items: center;
  pointer-events: none; /* evita interferenze */
}

.slide-track img {
  width: 195px;   /* +30% (prima 150px) */
  height: 195px;
  object-fit: cover;
  border-radius: 0;
}

/* FRECCE SEMPRE SOPRA */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10; /* 👈 le tiene fisse sopra */
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px;
}

.left {
  left: 10px;
}

.right {
  right: 10px;
}

/* dimensione + colore */
.arrow img {
  width: 40px;
  height: 40px;
  filter: brightness(0) invert(1); /* bianco */
}

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .grid img {
      width: 100%;
      border-radius: 10px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #f6a017;
      color: #e52627;
    }
.carousel{
  margin: 100px auto;
  width: 100%;
  display: flex;
  overflow-x: auto;
}
.carousel::-webkit-scrollbar {
  display: none;
}
.card{
  width: 195px;   /* +30% (prima 150px) */
  height: 195px;
  object-fit: cover;
  border-radius: 0;
  flex: 0 0 5em;
}
.group{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1em;
  animation: spin 5s infinite linear;
  padding-right: 1em;
}
@keyframes spin{
  from{translate: 0;}
  to{translate: -100%;}
}
  </style>
</head>

<body>

<header style="background: #e52627; padding: 15px; text-align: center;">
  <img src="LOGO STUDIO.png" alt="Basil Seal Studio Logo" style="height: 70px;">
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#sets">Sticker Set</a>
  <a href="#collector">Collector's Page</a>
  <a href="#contact">Contatti</a>
</nav>

<!-- HOME -->
<section id="home">

  <div class="slideshow" id="slider">
  
  <!-- FRECCIA SINISTRA -->
  <button class="arrow left" id="leftBtn">
    <img src="left-arrow.png">
  </button>

  <div class="slide-track" id="slideTrack"></div>

  <!-- FRECCIA DESTRA -->
  <button class="arrow right" id="rightBtn">
    <img src="right-arrow.png">
  </button>

</div>

<div class="carousel">
  <div class="group">
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
  </div>

  <div aria-hidden class="group">
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
    <div class="card">
      <img src="DUNGEON MONSTERS_01.png">
    </div>
  </div>
</div>

<!-- STICKER SET -->
<section id="sets">
  <h2>Sticker Set</h2>

  <h3>Set 1</h3>
  <div class="grid">
    <img src="images/set1/sticker1.png">
    <img src="images/set1/sticker2.png">
    <img src="images/set1/sticker3.png">
  </div>

  <h3>Set 2</h3>
  <div class="grid">
    <img src="images/set2/sticker1.png">
    <img src="images/set2/sticker2.png">
    <img src="images/set2/sticker3.png">
  </div>
</section>

<!-- COLLECTOR PAGE
<section id="collector">
  <h2>Collector's Page</h2>
  <div class="grid">
    <img src="images/collector/art1.png">
    <img src="images/collector/art2.png">
    <img src="images/collector/art3.png">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" style="background: #e52627; text-align: center; color: #f6a017; padding: 40px 20px;">
  <h2>Contatti</h2>

  <p>Email: basilsealstudio@email.com</p>

  <p>
    Instagram:
    <a href="https://www.instagram.com/basil_of_the_nimh/" target="_blank" style="color: #f6a017; text-decoration: none;">
      @basil_of_the_nimh
    </a>
  </p>

  <p>
    Twitter:
    <a href="https://x.com/basilsealstudio" target="_blank" style="color: #f6a017; text-decoration: none;">
      @basilsealstudio
    </a>
  </p>
</section>

<footer>
  © 2026 Basil Seal Studio
</footer>

</body>
<script>
const images = [
  "DUNGEON MONSTERS_01.png",
  "DUNGEON MONSTERS_02.png",
  "DUNGEON MONSTERS_03.png",
  "DUNGEON MONSTERS_04.png",
  "DUNGEON MONSTERS_05-01.png",
  "DUNGEON MONSTERS_06.png",
  "DUNGEON MONSTERS_07.png",
  "MYTHO'S-01.png",
  "MYTHO'S-02.png",
  "MYTHO'S-03.png",
  "MYTHO'S-04.png",
  "MYTHO'S-05.png",
  "MYTHO'S-06.png",
  "MYTHO'S-07.png",
  "MYTHO'S-08.png"
];

const track = document.getElementById("slideTrack");
const slider = document.getElementById("slider");

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

// shuffle
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

// crea immagini
function createSlides() {
  track.innerHTML = "";
  const shuffled = shuffle([...images]);

  shuffled.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    track.appendChild(img);
  });
}

createSlides();

// SCORRIMENTO CON FRECCE
let currentOffset = 0;
const scrollAmount = 250;

rightBtn.addEventListener("click", () => {
  currentOffset -= scrollAmount;
  track.style.transform = `translateX(${currentOffset}px)`;
});

leftBtn.addEventListener("click", () => {
  currentOffset += scrollAmount;
  track.style.transform = `translateX(${currentOffset}px)`;
});
</script>
</html>
